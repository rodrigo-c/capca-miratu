<div class="pagination">
    {% with ""|center:num_pages as range %}
        {% for _ in range %}
            {% if forloop.counter != page_num %}
                <a href="?page_num={{ forloop.counter }}">{{ forloop.counter }}</a>
            {% else %}
                {{ forloop.counter }}
            {% endif %}
        {% endfor %}
    {% endwith %}
</div>
