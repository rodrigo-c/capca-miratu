{% load i18n l10n %}
<div id="{{ id }}_div_map" class="dj_map_wrapper">
    <div id="{{ id }}_map" class="dj_map"></div>
    {% if not disabled %}
        <span class="clear_features">
            <a href="">Limpiar punto</a>
        </span>
    {% endif %}
    {% if display_raw %}
        <p>{% translate "Debugging window (serialized value)" %}</p>
    {% endif %}
    <textarea id="{{ id }}"
              class="vSerializedField required"
              cols="150"
              rows="10"
              name="{{ name }}"
              {% if not display_raw %} hidden{% endif %}>{{ serialized }}</textarea>
    <script>
        var base_layer = new ol.layer.Tile({source: new ol.source.OSM()});
        var options = {
            base_layer: base_layer,
            geom_name: '{{ geom_type }}',
            id: '{{ id }}',
            map_id: '{{ id }}_map',
            map_srid: {{ map_srid|unlocalize }},
            name: '{{ name }}',
            default_lon: {{ default_lon|unlocalize }},
            default_lat: {{ default_lat|unlocalize }},
            default_zoom: {{ default_zoom|unlocalize }},
        };

        var {{ module }} = new MapWidget(options);
        document.getElementById('{{ id }}_map').style = null;
    </script>
</div>
