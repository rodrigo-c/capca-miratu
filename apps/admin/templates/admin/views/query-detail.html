<div class="view query-detail hidden" id="query-detail">
    <div class="main-label link" id="link-to-query-list">Todas las consultas</div>
    <div class="query-item" id="query-detail-item">
        <div class="name"></div>
        <div class="content">
            <div class="attributes">
                <div class="times">
                    <div class="start-at"></div>
                    <div class="end-at"></div>
                </div>
                <div class="status">
                    <div class="status-label">Estado actual:</div>
                    <div class="status-value"></div>
                </div>
            </div>
            <div class="actions">
                <a class="action-button" id="detail-action-edit" target="_blank">Editar</a>
                <a class="action-button" id="detail-action-submit" target="_blank">Link</a>
                <a class="action-button" id="detail-action-map" target="_blank">Mapa</a>
                <a class="action-button" id="detail-action-data" target="_blank">Datos</a>
            </div>
        </div>
    </div>
    <div class="tabs" id="query-detail-tabs">
        <div class="tab-links">
            <div class="tab-link active" id="summary-link">Resumen</div>
            <div class="tab-link" id="questions-link">Preguntas</div>
        </div>
        <div class="summary tab" id="query-detail-summary">
            <div class="responses-total">
                <div class="total-label">Total respuestas:</div>
                <div class="total-value"></div>
            </div>
            <canvas class="summary-chart hidden" id="summary-chart"></canvas>
            <div class="chart-labels hidden" id="summary-chart-labels"></div>
            <div class="content"></div>
        </div>
        <div class="questions tab hidden" id="query-detail-questions">
            <div class="question hidden" id="question-template">
                <div class="question-number">
                    Pregunta <span class="value"></span>
                </div>
                <div class="question-name"></div>
                <div class="responses-total">
                    <div class="total-label">Total respuestas:</div>
                    <div class="total-value"></div>
                </div>
                <div class="chart-container">
                    <canvas class="question-chart hidden"></canvas>
                </div>
                <div class="chart-labels hidden"></div>
            </div>
            <div class="content"></div>
        </div>
    </div>
</div>
