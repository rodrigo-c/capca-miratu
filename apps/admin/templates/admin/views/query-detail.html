<div class="view query-detail hidden" id="query-detail">
    <div class="query-box-item" id="query-detail-item">
        <div class="name"></div>
        <div class="content">
            <div class="attributes">
                <div class="times">
                    <div class="start-at"></div>
                    <div class="end-at"></div>
                </div>
                <div class="status">
                    <div class="status-label">Estado actual:</div>
                    <div class="status-value"></div>
                </div>
            </div>
            <div class="actions">
                <div class="total-responses">
                    <span class="field">Respuestas totales:</span><span class="value"></span>
                </div>
                <div class="content">
                    <a class="secondary-button" id="detail-action-submit" target="_blank">Ver</a>
                </div>
            </div>
        </div>
    </div>
    <div class="query-preview">
        <div class="subtitle">Descripción</div>
        <div class="query-preview-description"></div>
        <div class="query-preview-questions"></div>
    </div>
</div>
